name: Update Entertainment Ranking

on:
  schedule:
    - cron: '0,30 * * * *'  # 每30分钟执行一次（0分和30分），避免整点跳过
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          
      - name: Install dependencies
        run: |
          pip install requests beautifulsoup4
          
      - name: Run update script
        run: python scripts/fetch_entertainment.py
        
      - name: Update heartbeat
        run: |
          echo "Last run: $(date +'%Y-%m-%d %H:%M:%S %Z')" > .last_run
          
      - name: Commit and push
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add data/entertainment_data.json .last_run
          git commit -m "Update ranking $(date +'%Y-%m-%d %H:%M:%S')" || true
          git push
