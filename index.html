<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>综合影视榜单</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:#f5f5f5;color:#333}
        .header{background:linear-gradient(135deg,#667eea,#764ba2);color:white;padding:20px;text-align:center}
        .header h1{font-size:24px;margin-bottom:6px}
        .header p{font-size:14px;opacity:.9}
        .update-time{text-align:center;padding:10px;background:#fff;border-bottom:1px solid #eee;font-size:13px;color:#666}
        .tabs{display:flex;background:#fff;border-bottom:1px solid #eee;overflow-x:auto}
        .tab{flex:1;min-width:80px;padding:14px 8px;text-align:center;cursor:pointer;border:none;background:none;font-size:14px;white-space:nowrap}
        .tab.active{color:#667eea;border-bottom:2px solid #667eea;font-weight:bold}
        .subtabs{display:flex;background:#fff;border-bottom:1px solid #eee;padding:0 10px}
        .subtab{padding:10px 14px;cursor:pointer;font-size:13px;color:#666;border:none;background:none}
        .subtab.active{color:#667eea;border-bottom:2px solid #667eea}
        .content{padding:15px;max-width:800px;margin:0 auto}
        .list{background:#fff;border-radius:8px;overflow:hidden;box-shadow:0 2px 8px rgba(0,0,0,.05)}
        .item{display:flex;align-items:center;padding:12px 15px;border-bottom:1px solid #f5f5f5}
        .item:hover{background:#fafafa}
        .num{width:32px;height:32px;display:flex;align-items:center;justify-content:center;border-radius:6px;font-weight:bold;font-size:14px;margin-right:12px;flex-shrink:0}
        .num.top3{background:linear-gradient(135deg,#ff6b6b,#ee5a5a);color:white}
        .num.normal{background:#f0f0f0;color:#666}
        .info{flex:1;min-width:0}
        .title{font-size:15px;color:#333;margin-bottom:3px;word-break:break-all}
        .meta{font-size:12px;color:#999}
        .meta span{margin-right:8px}
        .hot{font-size:12px;color:#ff6b6b;flex-shrink:0;margin-left:8px}
        .err{text-align:center;padding:40px 20px;color:#999}
        .err .icon{font-size:40px;margin-bottom:10px}
        .loading{text-align:center;padding:40px;color:#999}
        .spin{width:36px;height:36px;border:3px solid #f3f3f3;border-top:3px solid #667eea;border-radius:50%;animation:spin 1s linear infinite;margin:0 auto 12px}
        @keyframes spin{0%{transform:rotate(0deg)}100%{transform:rotate(360deg)}}
        .cover{width:45px;height:60px;border-radius:4px;object-fit:cover;margin-right:10px;flex-shrink:0}
        .badge{display:inline-block;padding:1px 5px;background:#ff6b6b;color:white;border-radius:3px;font-size:11px;margin-left:6px}
        @media(max-width:600px){.header h1{font-size:20px}.item{padding:10px 12px}.title{font-size:14px}}
    </style>
<base target="_blank">
</head>
<body>
    <div class="header">
        <h1>🎬 综合影视榜单</h1>
        <p>微博 · 豆瓣 · 抖音 · 百度 影视热度聚合</p>
    </div>
    <div class="update-time" id="ut">加载中...</div>
    <div class="tabs" id="pt"></div>
    <div class="subtabs" id="st"></div>
    <div class="content" id="ct">
        <div class="loading"><div class="spin"></div><p>正在加载数据...</p></div>
    </div>

<script>
let D=null,P='weibo',T='weibo_entertainment';
const C={weibo:{n:'微博',i:'📱'},douban:{n:'豆瓣',i:'📖'},douyin:{n:'抖音',i:'🎵'},baidu:{n:'百度',i:'🔍'}};

async function load(){
    try{
        const urls=['data/all_rankings.json','./data/all_rankings.json','/data/all_rankings.json','all_rankings.json'];
        let r=null,le=null;
        for(const u of urls){
            try{const x=await fetch(u,{cache:'no-cache'});if(x.ok){r=x;break}}catch(e){le=e}
        }
        if(!r)throw new Error('无法加载数据'+(le?': '+le.message:''));
        D=await r.json();
        if(!D||!D.update_time)throw new Error('数据格式异常');
        document.getElementById('ut').textContent='更新时间：'+D.update_time+'（北京时间）';
        renderP();renderS();renderC();
    }catch(e){
        console.error(e);
        document.getElementById('ct').innerHTML='<div class="err"><div class="icon">⚠️</div><p>数据加载失败</p><p style="font-size:12px;color:#bbb;margin-top:8px">'+e.message+'</p><p style="font-size:12px;color:#667eea;margin-top:12px;cursor:pointer;text-decoration:underline" onclick="location.reload(true)">点击刷新重试</p></div>';
        document.getElementById('ut').textContent='加载失败';
    }
}

function renderP(){
    const el=document.getElementById('pt');el.innerHTML='';
    Object.keys(C).forEach(k=>{
        const b=document.createElement('button');
        b.className='tab'+(k===P?' active':'');
        b.textContent=C[k].i+' '+C[k].n;
        b.onclick=()=>{P=k;const x=D[k];if(x&&x.tabs&&x.tabs.length)T=x.tabs[0].key;renderP();renderS();renderC()};
        el.appendChild(b);
    });
}

function renderS(){
    const el=document.getElementById('st');el.innerHTML='';
    if(!D||!D[P])return;
    (D[P].tabs||[]).forEach(t=>{
        const b=document.createElement('button');
        b.className='subtab'+(t.key===T?' active':'');
        b.textContent=t.title;
        b.onclick=()=>{T=t.key;renderS();renderC()};
        el.appendChild(b);
    });
}

function renderC(){
    const el=document.getElementById('ct');
    if(!D||!D[P]){el.innerHTML='<div class="err"><div class="icon">📭</div><p>暂无数据</p></div>';return}
    const tab=(D[P].tabs||[]).find(t=>t.key===T);
    if(!tab){el.innerHTML='<div class="err"><div class="icon">📭</div><p>暂无数据</p></div>';return}
    if(tab.error){el.innerHTML='<div class="err"><div class="icon">⚠️</div><p>'+tab.error+'</p></div>';return}
    const items=tab.items||[];
    if(!items.length){el.innerHTML='<div class="err"><div class="icon">📭</div><p>本时段暂无数据</p></div>';return}
    let h='<div class="list">';
    items.forEach((item,idx)=>{
        const top=idx<3,cls=top?'top3':'normal';
        let meta='',extra='';
        if(P==='weibo'){
            if(item.hot)extra+='<span class="hot">🔥 '+item.hot+'</span>';
            if(item.platform)meta+='<span>📺 '+item.platform+'</span>';
            if(item.cast)meta+='<span>👤 '+item.cast+'</span>';
            if(item.score&&item.score!=='暂无')meta+='<span class="badge">'+item.score+'</span>';
            if(item.source)meta+='<span style="color:#667eea">'+item.source+'</span>';
        }else if(P==='douban'){
            if(item.cover){extra='<img class="cover" src="'+item.cover+'" alt="" onerror="this.style.display='none'">'}
            if(item.score)meta+='<span class="badge">⭐ '+item.score+'</span>';
            if(item.types)meta+='<span>'+item.types+'</span>';
            if(item.actors)meta+='<span>👤 '+item.actors+'</span>';
            if(item.release_date)meta+='<span>📅 '+item.release_date+'</span>';
        }else if(P==='douyin'){
            if(item.hot)extra+='<span class="hot">🔥 '+item.hot+'</span>';
            if(item.score)meta+='<span class="badge">⭐ '+item.score+'</span>';
            if(item.types)meta+='<span>'+item.types+'</span>';
            if(item.actors)meta+='<span>👤 '+item.actors+'</span>';
        }else if(P==='baidu'){
            if(item.hot_desc)extra+='<span class="hot">🔥 '+item.hot_desc+'</span>';
            if(item.desc)meta+='<span>'+item.desc+'</span>';
        }
        h+='<div class="item">';
        h+='<div class="num '+cls+'">'+(idx+1)+'</div>';
        if(extra&&P==='douban')h+=extra;
        h+='<div class="info">';
        h+='<div class="title">'+(item.title||'未知')+'</div>';
        if(meta)h+='<div class="meta">'+meta+'</div>';
        h+='</div>';
        if(extra&&P!=='douban')h+=extra;
        h+='</div>';
    });
    h+='</div>';
    el.innerHTML=h;
}

document.addEventListener('DOMContentLoaded',load);
</script>
</body>
</html>
